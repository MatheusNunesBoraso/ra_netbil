name: easyar_flutter
description: EasyAR Sense SDK wrapper for Flutter (Netbil RA Netbil).
version: 0.0.1
publish_to: 'none'

environment:
  sdk: ^3.11.4
  flutter: ">=3.3.0"

dependencies:
  flutter:
    sdk: flutter

flutter:
  plugin:
    platforms:
      android:
        package: com.netbil.easyar_flutter
        pluginClass: EasyArFlutterPlugin
      ios:
        pluginClass: EasyArFlutterPlugin
