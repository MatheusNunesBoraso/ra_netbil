name: Build Android APK + iOS IPA (unsigned)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.41.6'
  APP_VERSION: '1.0.${{ github.run_number }}'

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Patch arcore_flutter_plugin for AGP 8+ (add namespace)
        run: |
          PLUGIN="$HOME/.pub-cache/hosted/pub.dev/arcore_flutter_plugin-0.1.0/android"
          if [ ! -f "$PLUGIN/build.gradle" ]; then
            echo "Plugin not found at $PLUGIN"; exit 1
          fi
          if ! grep -q "namespace" "$PLUGIN/build.gradle"; then
            sed -i '/^android {/a\    namespace "com.difrancescogianmarco.arcore_flutter_plugin"' "$PLUGIN/build.gradle"
            echo "Added namespace to plugin build.gradle"
          fi
          sed -i 's/ package="com.difrancescogianmarco.arcore_flutter_plugin"//' "$PLUGIN/src/main/AndroidManifest.xml" || true
          grep -n namespace "$PLUGIN/build.gradle" || true

      - name: Build APK (release, debug-signed)
        run: |
          flutter build apk --release \
            --build-name=${{ env.APP_VERSION }} \
            --build-number=${{ github.run_number }}

      - name: Rename APK with version
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/ra-netbil-v${{ env.APP_VERSION }}.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ra-netbil-android-apk-v${{ env.APP_VERSION }}
          path: build/app/outputs/flutter-apk/ra-netbil-v${{ env.APP_VERSION }}.apk
          if-no-files-found: error
          retention-days: 30

  build-ios:
    name: Build iOS IPA (unsigned)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Install CocoaPods
        working-directory: ios
        run: pod install --repo-update

      - name: Build iOS (release, no codesign)
        run: |
          flutter build ios --release --no-codesign \
            --build-name=${{ env.APP_VERSION }} \
            --build-number=${{ github.run_number }}

      - name: Package unsigned IPA
        run: |
          cd build/ios/iphoneos
          mkdir -p Payload
          mv Runner.app Payload/
          zip -qr ra-netbil-v${{ env.APP_VERSION }}.ipa Payload
          ls -lh *.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ra-netbil-ios-ipa-unsigned-v${{ env.APP_VERSION }}
          path: build/ios/iphoneos/ra-netbil-v${{ env.APP_VERSION }}.ipa
          if-no-files-found: error
          retention-days: 30
