name: Build Android APK + iOS IPA (unsigned)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.41.6'

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Patch arcore_flutter_plugin for AGP 8+ (add namespace)
        run: |
          PLUGIN="$HOME/.pub-cache/hosted/pub.dev/arcore_flutter_plugin-0.1.0/android"
          if [ ! -f "$PLUGIN/build.gradle" ]; then
            echo "Plugin not found at $PLUGIN"; exit 1
          fi
          if ! grep -q "namespace" "$PLUGIN/build.gradle"; then
            sed -i '/^android {/a\    namespace "com.difrancescogianmarco.arcore_flutter_plugin"' "$PLUGIN/build.gradle"
            echo "Added namespace to plugin build.gradle"
          fi
          sed -i 's/ package="com.difrancescogianmarco.arcore_flutter_plugin"//' "$PLUGIN/src/main/AndroidManifest.xml" || true
          echo "--- Patched build.gradle ---"
          grep -n namespace "$PLUGIN/build.gradle" || true

      - name: Build APK (release, debug-signed)
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ra-netbil-android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
          retention-days: 30

  build-ios:
    name: Build iOS IPA (unsigned)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Install CocoaPods
        working-directory: ios
        run: pod install --repo-update

      - name: Build iOS (release, no codesign)
        run: flutter build ios --release --no-codesign

      - name: Package unsigned IPA
        run: |
          cd build/ios/iphoneos
          mkdir -p Payload
          mv Runner.app Payload/
          zip -qr Runner.ipa Payload
          ls -lh Runner.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ra-netbil-ios-ipa-unsigned
          path: build/ios/iphoneos/Runner.ipa
          if-no-files-found: error
          retention-days: 30
