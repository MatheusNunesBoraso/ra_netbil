name: Build Android APK + iOS IPA

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.41.6'
  APP_VERSION: '1.0.${{ github.run_number }}'

jobs:
  build-android:
    name: Build Android APK
    if: false  # Temporariamente desligado; foco no iOS. Trocar para 'true' quando quiser reativar.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Build APK (release, debug-signed)
        run: |
          flutter build apk --release \
            --build-name=${{ env.APP_VERSION }} \
            --build-number=${{ github.run_number }}

      - name: Rename APK with version
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/ra-netbil-v${{ env.APP_VERSION }}.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ra-netbil-android-apk-v${{ env.APP_VERSION }}
          path: build/app/outputs/flutter-apk/ra-netbil-v${{ env.APP_VERSION }}.apk
          if-no-files-found: error
          retention-days: 30

  build-ios:
    name: Build iOS IPA (signed, App Store)
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Install signing certificate and provisioning profile
        env:
          IOS_P12_BASE64: ${{ secrets.IOS_P12_BASE64 }}
          IOS_P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          IOS_PROVISION_BASE64: ${{ secrets.IOS_PROVISION_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ github.run_id }}-${{ github.run_number }}
        run: |
          CERT_PATH="$RUNNER_TEMP/build_certificate.p12"
          PROVISION_PATH="$RUNNER_TEMP/build_pp.mobileprovision"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          echo -n "$IOS_P12_BASE64" | base64 --decode -o "$CERT_PATH"
          echo -n "$IOS_PROVISION_BASE64" | base64 --decode -o "$PROVISION_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$IOS_P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PROVISION_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/"

          echo "--- Identities imported ---"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Install CocoaPods
        working-directory: ios
        run: |
          # Evita problema de clonar repo trunk (CocoaPods ja usa CDN por default)
          pod repo remove trunk 2>/dev/null || true
          pod install

      - name: Build signed IPA (App Store method)
        run: |
          flutter build ipa --release \
            --build-name=${{ env.APP_VERSION }} \
            --build-number=${{ github.run_number }} \
            --export-options-plist=ios/ExportOptions.plist

      - name: Rename IPA with version
        run: |
          cd build/ios/ipa
          IPA=$(ls *.ipa | head -n1)
          cp "$IPA" "ra-netbil-v${{ env.APP_VERSION }}.ipa"
          ls -lh *.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ra-netbil-ios-ipa-signed-v${{ env.APP_VERSION }}
          path: build/ios/ipa/ra-netbil-v${{ env.APP_VERSION }}.ipa
          if-no-files-found: error
          retention-days: 30

      - name: Upload to App Store Connect (TestFlight)
        env:
          APPSTORE_API_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
          APPSTORE_API_ISSUER_ID: ${{ secrets.APPSTORE_API_ISSUER_ID }}
          APPSTORE_API_PRIVATE_KEY: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}
        run: |
          if [ -z "$APPSTORE_API_KEY_ID" ]; then
            echo "::notice::APPSTORE_API_* secrets nao configurados. IPA assinado ficou como artifact; adicione os 3 secrets para habilitar upload automatico no TestFlight."
            exit 0
          fi

          mkdir -p ~/.appstoreconnect/private_keys
          echo -n "$APPSTORE_API_PRIVATE_KEY" > "$HOME/.appstoreconnect/private_keys/AuthKey_${APPSTORE_API_KEY_ID}.p8"

          xcrun altool --upload-app \
            --type ios \
            --file "build/ios/ipa/ra-netbil-v${{ env.APP_VERSION }}.ipa" \
            --apiKey "$APPSTORE_API_KEY_ID" \
            --apiIssuer "$APPSTORE_API_ISSUER_ID"

      - name: Publish GitHub Release (direct IPA download)
        if: ${{ (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && always() }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.APP_VERSION }}
          name: Build v${{ env.APP_VERSION }}
          body: |
            IPA assinado (App Store) gerado automaticamente pelo CI.
            Download direto abaixo.
          files: build/ios/ipa/ra-netbil-v${{ env.APP_VERSION }}.ipa
          draft: false
          prerelease: true
